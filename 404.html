<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面未找到 | 风行 AI 文娱生态平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #ff6b00;
      --primary-hover: #e65100;
      --primary-soft: rgba(255, 107, 0, 0.1);
      --primary-glow: rgba(255, 107, 0, 0.3);
      --bg: #f7f9fc;
      --bg-alt: #f8fafc;
      --white: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --line: rgba(15, 23, 42, 0.08);
      --border: rgba(226, 232, 240, 0.8);
      --glass: rgba(255, 255, 255, 0.8);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --max-width: 1240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text); background: var(--bg); line-height: 1.6; overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; transition: all 0.3s ease; }
    .container { width: min(var(--max-width), calc(100% - 48px)); margin: 0 auto; position: relative; }
    
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: radial-gradient(circle at center, #fff 0%, #f7f9fc 100%);
    }
    .error-content {
      max-width: 600px;
    }
    .error-code {
      font-size: clamp(120px, 15vw, 200px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      letter-spacing: -0.05em;
    }
    .error-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text);
    }
    .error-desc {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 20px var(--primary-soft);
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }
    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text);
      background: white;
    }
    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }
    .illustration {
      margin-bottom: 40px;
      position: relative;
    }
    .floating-icon {
      position: absolute;
      font-size: 40px;
      color: var(--primary);
      opacity: 0.2;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="illustration">
        <i class="fa-solid fa-ghost floating-icon" style="top: -20px; left: 20%; animation-delay: 0s;"></i>
        <i class="fa-solid fa-paper-plane floating-icon" style="top: 20px; right: 20%; animation-delay: 2s;"></i>
        <div class="error-code">404</div>
      </div>
      <h1 class="error-title">抱歉，页面去火星了</h1>
      <p class="error-desc">您访问的页面可能已被移动、删除，或者从未存在过。请检查 URL 是否正确，或返回首页。</p>
      <div class="error-actions">
        <a href="首页.html" class="btn btn-primary">
          <i class="fa-solid fa-house"></i> 返回首页
        </a>
        <a href="javascript:history.back()" class="btn btn-outline">
          <i class="fa-solid fa-arrow-left"></i> 返回上一页
        </a>
      </div>
    </div>
  </div>
</body>
</html>
