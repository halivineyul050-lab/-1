<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提交成功 - 风行 AI 文娱生态平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #ff6b00;
      --primary-hover: #e65100;
      --primary-soft: rgba(255, 107, 0, 0.1);
      --primary-glow: rgba(255, 107, 0, 0.3);
      --bg: #f7f9fc;
      --bg-alt: #f8fafc;
      --white: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --line: rgba(15, 23, 42, 0.08);
      --border: rgba(226, 232, 240, 0.8);
      --glass: rgba(255, 255, 255, 0.8);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --max-width: 1240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text); background: var(--bg); line-height: 1.6; overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; transition: all 0.3s ease; }
    .container { width: min(var(--max-width), calc(100% - 48px)); margin: 0 auto; position: relative; }
    
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #f8fafc;
      padding: 40px 20px;
    }
    .success-card {
      max-width: 500px;
      background: white;
      padding: 60px 40px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: #22c55e;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 32px;
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
    }
    .success-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text);
    }
    .success-desc {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      transition: all 0.3s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-card">
      <div class="success-icon">
        <i class="fa-solid fa-check"></i>
      </div>
      <h1 class="success-title">信息提交成功</h1>
      <p class="success-desc">感谢您的咨询！我们的行业专家已经收到了您的需求，将在 24 小时内（工作日）通过电话或邮件与您联系，请保持通讯畅通。</p>
      <div class="success-actions">
        <a href="首页.html" class="btn btn-primary">返回首页</a>
        <a href="产品中心.html" class="btn btn-outline">浏览更多产品</a>
      </div>
    </div>
  </div>
</body>
</html>
